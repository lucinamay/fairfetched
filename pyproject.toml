[project]
name = "fairfetched"
version = "0.1.0-alpha"
description = "data APIs for reproducible data fetching in cheminformatics"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "polars>=1.38.1",
    "pystow>=0.7.28",
    "rich>=14.3.3",
]

[project.optional-dependencies]
vis = [
    "sqlalchemy>=2.0.46",
]
download = [
    "chembl-downloader>=0.5.2",
]
dev = [
    "pytest>=9.0.2",
]


[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]


[project.urls]
Homepage = "https://github.com/lucinamay/fairfetched"
